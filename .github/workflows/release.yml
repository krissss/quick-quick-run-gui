name: Release

on:
  release:
    types: [published]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.release.tag_name }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      version: ${{ steps.metadata.outputs.version }}
      release_id: ${{ steps.metadata.outputs.release_id }}
      notes: ${{ steps.changelog.outputs.notes }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Resolve release metadata
        id: metadata
        shell: bash
        env:
          RELEASE_ID: ${{ github.event.release.id }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          echo "version=${RELEASE_TAG#v}" >> "$GITHUB_OUTPUT"
          echo "release_id=${RELEASE_ID}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog notes
        id: changelog
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('node:fs')
            const releaseTag = process.env.RELEASE_TAG
            const version = releaseTag.replace(/^v/, '')
            let notes = `See CHANGELOG.md for ${releaseTag}.`

            if (fs.existsSync('CHANGELOG.md')) {
              const changelog = fs.readFileSync('CHANGELOG.md', 'utf8')
              const escaped = version.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')
              const heading = new RegExp(`^##\\s+\\[?v?${escaped}\\]?.*$`, 'm').exec(changelog)

              if (heading) {
                const start = heading.index + heading[0].length
                const rest = changelog.slice(start)
                const nextHeading = rest.search(/^##\s+/m)
                const linkRefs = rest.search(/^\[[^\]]+\]:\s+/m)
                const candidates = [nextHeading, linkRefs].filter(index => index >= 0)
                const end = candidates.length > 0 ? Math.min(...candidates) : rest.length
                const extracted = rest.slice(0, end).trim()
                if (extracted) notes = extracted
              }
            }

            core.setOutput('notes', notes)
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}

  build:
    name: Build (${{ matrix.artifact }})
    needs: prepare
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            # macOS updater metadata is generated from the app bundle artifact;
            # dmg is still kept as the human-facing installer.
            args: '--target aarch64-apple-darwin --bundles app,dmg'
            artifact: macos-aarch64
            cache_key: macos-aarch64
            upload_path: |
              src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/**/*.dmg
              src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz
              src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz.sig
          - platform: macos-latest
            args: '--target x86_64-apple-darwin --bundles app,dmg'
            artifact: macos-x86_64
            cache_key: macos-x86_64
            upload_path: |
              src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/**/*.dmg
              src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app.tar.gz
              src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app.tar.gz.sig
          - platform: windows-latest
            args: '--bundles nsis'
            artifact: windows
            cache_key: windows
            upload_path: |
              src-tauri/target/release/bundle/nsis/**/*.exe
              src-tauri/target/release/bundle/nsis/**/*.exe.sig
          - platform: ubuntu-24.04
            args: '--bundles appimage'
            artifact: linux
            cache_key: linux
            upload_path: |
              src-tauri/target/release/bundle/appimage/**/*.AppImage
              src-tauri/target/release/bundle/appimage/**/*.AppImage.sig

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Install system dependencies (Ubuntu only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ runner.os == 'macOS' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          key: ${{ matrix.cache_key }}
          cache-on-failure: true

      - name: Cache Tauri tools
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/tauri
            ~/Library/Caches/tauri
            ~/AppData/Local/tauri
            src-tauri/target/.tauri
          key: tauri-tools-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'src-tauri/Cargo.lock') }}
          restore-keys: |
            tauri-tools-${{ runner.os }}-

      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.prepare.outputs.release_id }}
          tauriScript: pnpm tauri
          args: ${{ matrix.args }}
          appVersion: ${{ needs.prepare.outputs.version }}
          tagName: ${{ github.event.release.tag_name }}
          includeUpdaterJson: false
          updaterJsonPreferNsis: true
          retryAttempts: 2

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.upload_path }}
          if-no-files-found: error

  publish-updater-json:
    name: Publish updater JSON
    needs: [prepare, build]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Generate and upload latest.json
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
          RELEASE_NOTES: ${{ needs.prepare.outputs.notes }}
          REPO: ${{ github.repository }}
        run: |
          node .github/scripts/generate-updater-json.mjs
          gh release upload "$RELEASE_TAG" latest.json --repo "$REPO" --clobber
