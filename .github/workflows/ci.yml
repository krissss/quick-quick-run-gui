name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-test:
    name: Rust checks
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Check formatting
        working-directory: src-tauri
        run: cargo fmt --all -- --check

      - name: Run clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

      - name: Run tests
        working-directory: src-tauri
        run: cargo test

  frontend-test:
    name: Frontend tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm test:unit

      - name: Run integration tests
        run: pnpm test:integration

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E frontend tests
        run: pnpm test:e2e:frontend

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level moderate

      - name: Frontend type check
        run: pnpm run build

  test:
    name: test
    runs-on: ubuntu-24.04
    needs: [rust-test, frontend-build, frontend-test]
    if: ${{ always() }}
    steps:
      - name: Check test results
        run: |
          rust_result="${{ needs.rust-test.result }}"
          frontend_result="${{ needs.frontend-build.result }}"
          frontend_test_result="${{ needs.frontend-test.result }}"
          echo "Rust tests: ${rust_result}"
          echo "Frontend build: ${frontend_result}"
          echo "Frontend tests: ${frontend_test_result}"
          test "${rust_result}" = "success"
          test "${frontend_result}" = "success"
          test "${frontend_test_result}" = "success"

  build:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            artifact: macos-aarch64
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            artifact: macos-x86_64
          - platform: windows-latest
            args: ''
            artifact: windows
          - platform: ubuntu-24.04
            args: ''
            artifact: linux

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Ubuntu only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Resolve release version
        id: release-version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog notes
        id: changelog
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('node:fs')
            const version = process.env.GITHUB_REF_NAME.replace(/^v/, '')
            let notes = `See CHANGELOG.md for ${process.env.GITHUB_REF_NAME}.`

            if (fs.existsSync('CHANGELOG.md')) {
              const changelog = fs.readFileSync('CHANGELOG.md', 'utf8')
              const escaped = version.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')
              const heading = new RegExp(`^##\\s+\\[?v?${escaped}\\]?.*$`, 'm').exec(changelog)

              if (heading) {
                const start = heading.index + heading[0].length
                const rest = changelog.slice(start)
                const nextHeading = rest.search(/^##\s+/m)
                const linkRefs = rest.search(/^\[[^\]]+\]:\s+/m)
                const candidates = [nextHeading, linkRefs].filter(index => index >= 0)
                const end = candidates.length > 0 ? Math.min(...candidates) : rest.length
                const extracted = rest.slice(0, end).trim()
                if (extracted) notes = extracted
              }
            }

            core.setOutput('notes', notes)

      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tauriScript: pnpm tauri
          args: ${{ matrix.args }}
          appVersion: ${{ steps.release-version.outputs.version }}
          tagName: ${{ github.ref_name }}
          releaseBody: ${{ steps.changelog.outputs.notes }}
          includeUpdaterJson: true
          updaterJsonPreferNsis: true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.AppImage
            src-tauri/target/release/bundle/**/*.tar.gz
            src-tauri/target/release/bundle/**/*.sig
            src-tauri/target/**/release/bundle/**/*.dmg
            src-tauri/target/**/release/bundle/**/*.msi
            src-tauri/target/**/release/bundle/**/*.exe
            src-tauri/target/**/release/bundle/**/*.deb
            src-tauri/target/**/release/bundle/**/*.AppImage
            src-tauri/target/**/release/bundle/**/*.tar.gz
            src-tauri/target/**/release/bundle/**/*.sig
          if-no-files-found: error
