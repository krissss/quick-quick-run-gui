name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  rust-test:
    name: Rust checks
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Check formatting
        working-directory: src-tauri
        run: cargo fmt --all -- --check

      - name: Run clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

      - name: Run tests
        working-directory: src-tauri
        run: cargo test

  frontend-test:
    name: Frontend tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Run unit tests
        run: pnpm test:unit

      - name: Run integration tests
        run: pnpm test:integration

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E frontend tests
        run: pnpm test:e2e:frontend

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level moderate

      - name: Frontend type check
        run: pnpm run build

  test:
    name: test
    runs-on: ubuntu-24.04
    needs: [rust-test, frontend-build, frontend-test]
    if: ${{ always() }}
    steps:
      - name: Check test results
        run: |
          rust_result="${{ needs.rust-test.result }}"
          frontend_result="${{ needs.frontend-build.result }}"
          frontend_test_result="${{ needs.frontend-test.result }}"
          echo "Rust tests: ${rust_result}"
          echo "Frontend build: ${frontend_result}"
          echo "Frontend tests: ${frontend_test_result}"
          test "${rust_result}" = "success"
          test "${frontend_result}" = "success"
          test "${frontend_test_result}" = "success"
